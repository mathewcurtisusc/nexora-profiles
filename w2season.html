<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexora Season Summary</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f7;
      margin: 0;
      padding: 40px 20px;
      color: #222;
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      padding: 32px 40px;
    }

    .title {
      margin: 0 0 12px 0;
      font-size: 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
    }

    .card {
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      background: #fff;
    }

    .card img {
      width: 100%;
      max-width: 360px;
      height: auto;
      object-fit: contain;
      display: block;
      margin: 0 auto 14px auto;
    }

    .label {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      text-transform: capitalize;
    }

    .count {
      font-size: 42px;
      font-weight: 800;
      line-height: 1;
    }

    @media (max-width: 720px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1 class="title">Nexora Season Summary</h1>

    <div class="grid">
      <div class="card">
        <img src="/nexora-profiles/images/spring.png" alt="Spring season">
        <div class="label">Spring</div>
        <div class="count" id="springCount">—</div>
      </div>

      <div class="card">
        <img src="/nexora-profiles/images/summer.png" alt="Summer season">
        <div class="label">Summer</div>
        <div class="count" id="summerCount">—</div>
      </div>

      <div class="card">
        <img src="/nexora-profiles/images/fall.png" alt="Fall season">
        <div class="label">Fall</div>
        <div class="count" id="fallCount">—</div>
      </div>

      <div class="card">
        <img src="/nexora-profiles/images/winter.png" alt="Winter season">
        <div class="label">Winter</div>
        <div class="count" id="winterCount">—</div>
      </div>
    </div>
  </div>

  <script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1WJwgffdxDgnn5ttuJAvgUYeWDmR-o0oOCXlHu-7qXfQ/export?format=csv&gid=154702468";
    const SEASON_COLUMN_INDEX = 12; // Column M (0-based index)

    function parseCSVLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          current += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function parseCSV(text) {
      const lines = text.replace(/\r/g, "").split("\n").filter(Boolean);
      if (lines.length <= 1) return [];
      return lines.slice(1).map(parseCSVLine);
    }

    function normalizeSeason(value) {
      return String(value || "").toLowerCase().trim();
    }

    function getSeasonField(values) {
      return values[SEASON_COLUMN_INDEX] || "";
    }

    async function loadCounts() {
      try {
        const response = await fetch(SHEET_CSV_URL, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const csvText = await response.text();
        const rows = parseCSV(csvText);

        let spring = 0;
        let summer = 0;
        let fall = 0;
        let winter = 0;

        for (const row of rows) {
          const season = normalizeSeason(getSeasonField(row));
          if (season === "spring") spring++;
          else if (season === "summer") summer++;
          else if (season === "fall") fall++;
          else if (season === "winter") winter++;
        }

        document.getElementById("springCount").textContent = spring;
        document.getElementById("summerCount").textContent = summer;
        document.getElementById("fallCount").textContent = fall;
        document.getElementById("winterCount").textContent = winter;
      } catch (err) {
        document.getElementById("springCount").textContent = "—";
        document.getElementById("summerCount").textContent = "—";
        document.getElementById("fallCount").textContent = "—";
        document.getElementById("winterCount").textContent = "—";
      }
    }

    loadCounts();
    setInterval(loadCounts, 30000);
  </script>
</body>
</html>
